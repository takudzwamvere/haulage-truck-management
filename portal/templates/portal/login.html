<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — HaulAge TMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            }
          },
          keyframes: {
            'fade-up': {
              '0%':   { opacity: '0', transform: 'translateY(16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          },
          animation: {
            'fade-up': 'fade-up 0.4s ease both',
          }
        }
      }
    }
  </script>
</head>
<body class="h-full bg-slate-950 flex items-center justify-center p-4">

  <!-- Background gradient blobs -->
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <div class="absolute -top-40 -left-40 w-[600px] h-[600px] rounded-full bg-brand-600/20 blur-3xl"></div>
    <div class="absolute -bottom-40 -right-40 w-[500px] h-[500px] rounded-full bg-sky-900/30 blur-3xl"></div>
  </div>

  <!-- Login card -->
  <div class="relative w-full max-w-sm animate-fade-up">

    <!-- Brand mark -->
    <div class="flex flex-col items-center mb-8">
      <div class="flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-600 shadow-lg shadow-brand-600/40 mb-4">
        <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
          <rect x="9" y="11" width="14" height="10" rx="2"/>
          <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">HaulAge TMS</h1>
      <p class="text-slate-400 text-sm mt-1">Sign in to your account</p>
    </div>

    <!-- Error message -->
    {% if messages %}
      {% for message in messages %}
        <div class="flex items-center gap-2 px-4 py-3 mb-4 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-sm">
          <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <!-- Card -->
    <div class="bg-slate-900/80 backdrop-blur-md border border-slate-700/60 rounded-2xl shadow-2xl p-8">
      <form method="post" action="{% url 'portal:login' %}" novalidate>
        {% csrf_token %}

        <!-- Username -->
        <div class="mb-5">
          <label for="id_username" class="block text-sm font-medium text-slate-300 mb-1.5">
            Username
          </label>
          <input
            id="id_username"
            type="text"
            name="username"
            autocomplete="username"
            autofocus
            required
            class="w-full px-4 py-2.5 rounded-xl bg-slate-800 border border-slate-600
                   text-white placeholder-slate-500 text-sm
                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                   transition-shadow"
            placeholder="Enter your username"
          />
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label for="id_password" class="block text-sm font-medium text-slate-300 mb-1.5">
            Password
          </label>
          <input
            id="id_password"
            type="password"
            name="password"
            autocomplete="current-password"
            required
            class="w-full px-4 py-2.5 rounded-xl bg-slate-800 border border-slate-600
                   text-white placeholder-slate-500 text-sm
                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                   transition-shadow"
            placeholder="Enter your password"
          />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full py-2.5 px-4 rounded-xl bg-brand-600 hover:bg-brand-500
                 text-white text-sm font-semibold
                 shadow-lg shadow-brand-600/30
                 transition-all duration-150 active:scale-[.98]"
        >
          Sign in
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-slate-600 mt-6">
      HaulAge Truck Management System &copy; {% now "Y" %}
    </p>
  </div>

</body>
</html>
