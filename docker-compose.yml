services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=haulage_user
      - POSTGRES_PASSWORD=haulage_pass
      - POSTGRES_DB=haulage
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haulage_user -d haulage"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn haulage.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=postgres://haulage_user:haulage_pass@db:5432/haulage
      - DEBUG=False
      - SECRET_KEY=assessor-secret-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0

volumes:
  postgres_data:
